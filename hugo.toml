baseURL = "https://mohitmonnappa.github.io/"
locale = "en-us"
title = "Mohit Monnappa"
paginate = 10
theme = "PaperMod"

[markup]
  [markup.highlight]
    noClasses = false
    codeFences = true
    lineNos = false
    tabWidth = 2
    guessSyntax = true
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 3
    ordered = true

[taxonomies]
  tag = "tags"
  category = "categories"

[[menu.main]]
  identifier = "posts"
  name = "Posts"
  url = "/posts/"
  weight = 10

[[menu.main]]
  identifier = "projects"
  name = "Projects"
  url = "/projects/"
  weight = 20

[[menu.main]]
  identifier = "tags"
  name = "Tags"
  url = "/tags/"
  weight = 30

[[menu.main]]
  identifier = "about"
  name = "About"
  url = "/about/"
  weight = 40

[params]
  env = "production"
  description = "CTFs · Projects · Notes"
  author = "Mohit Monnappa T N"
  github = "https://github.com/mohitmonnappa"
  linkedin = "https://linkedin.com/in/mohit-monnappa"

  defaultTheme = "light"

  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = false
  ShowRssButtonInSectionTermList = false
  ShowToc = true
  TocOpen = false
  mainSections = ["posts"]

  [params.profileMode]
    enabled = true
    title = "Mohit Monnappa"
    subtitle = "Cybersecurity enthusiast · CTF player · ISE student at BMSIT&M, Bangalore"
    imageUrl = "/images/discord-pfp-bobchamp123456.png"
    imageWidth = 150
    imageHeight = 150
    imageTitle = "Mohit Monnappa"

    [[params.profileMode.buttons]]
      name = "Posts"
      url = "/posts/"

    [[params.profileMode.buttons]]
      name = "Projects"
      url = "/projects/"

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/mohitmonnappa"

  [[params.socialIcons]]
    name = "linkedin"
    url = "https://linkedin.com/in/mohit-monnappa"

  [[params.socialIcons]]
    name = "email"
    url = "mailto:monnappamohit@gmail.com"
