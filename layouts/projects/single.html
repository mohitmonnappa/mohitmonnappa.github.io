{{ define "main" }}
  <div class="project-single">
    <div class="crumb">
      <a href="{{ "/projects/" | relURL }}">projects</a> / {{ .Slug }}
    </div>

    {{ with .Params.tech }}
    <div class="project-tech">
      {{ range . }}<span class="pill cat">{{ . }}</span>{{ end }}
    </div>
    {{ end }}

    <h1 class="post-title">{{ .Title }}</h1>
    {{ with .Params.subtitle }}<p class="project-lead">{{ . }}</p>{{ end }}

    <div class="post-content md-content">
      {{ .Content }}
    </div>

    {{ with .Params.github }}
    <a class="project-gh-link" href="{{ . }}" target="_blank" rel="noopener">View on GitHub →</a>
    {{ end }}
  </div>
{{ end }}
