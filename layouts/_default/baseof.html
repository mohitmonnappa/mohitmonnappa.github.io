<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} · {{ .Site.Title }}{{ end }}</title>
  <meta name="description" content="{{ if .IsHome }}{{ .Site.Params.description }}{{ else }}{{ .Summary | plainify | truncate 160 }}{{ end }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ "/css/main.css" | relURL }}">
  <script>
    (function() {
      var saved = localStorage.getItem('theme');
      var preferred = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', saved || preferred);
    })();
  </script>
</head>
<body>
  {{ partial "header.html" . }}
  <main>
    {{ block "main" . }}{{ end }}
  </main>
  {{ partial "footer.html" . }}
  <script src="{{ "/js/theme.js" | relURL }}"></script>
  <script>
    (function() {
      function syncIcon() {
        var t = document.documentElement.getAttribute('data-theme');
        document.querySelectorAll('.sun').forEach(function(el){ el.style.display = t==='dark'?'none':''; });
        document.querySelectorAll('.moon').forEach(function(el){ el.style.display = t==='dark'?'':'none'; });
      }
      syncIcon();
      var _o = window.toggleTheme;
      window.toggleTheme = function(){ if(_o) _o(); syncIcon(); };
    })();
  </script>
</body>
</html>
