<div class="topbar">
  <div class="wrap">
    <a class="logo" href="{{ "/" | relURL }}">
      <span class="mark">M</span>
      <span>{{ .Site.Title }}<small>{{ .Site.Params.description }}</small></span>
    </a>
    <nav class="topnav">
      <a href="{{ "/" | relURL }}">Home</a>
      <a href="{{ "/writeups/" | relURL }}">Writeups</a>
      <a href="{{ "/projects/" | relURL }}">Projects</a>
      <a href="{{ "/tags/" | relURL }}">Tags</a>
      <a href="{{ "/about/" | relURL }}">About</a>
    </nav>
    <button class="theme-btn" onclick="toggleTheme()" aria-label="Toggle theme" title="Toggle theme">
      <span class="sun" aria-hidden="true">☀</span><span class="moon" aria-hidden="true" style="display:none">☽</span>
    </button>
  </div>
</div>
<script>
  (function() {
    var t = document.documentElement.getAttribute('data-theme');
    var btn = document.currentScript ? document.currentScript.previousElementSibling : null;
    function syncIcon() {
      var theme = document.documentElement.getAttribute('data-theme');
      document.querySelectorAll('.sun').forEach(function(el){ el.style.display = theme === 'dark' ? 'none' : ''; });
      document.querySelectorAll('.moon').forEach(function(el){ el.style.display = theme === 'dark' ? '' : 'none'; });
    }
    syncIcon();
    var _orig = window.toggleTheme;
    window.toggleTheme = function() { if(_orig) _orig(); syncIcon(); };
  })();
</script>
